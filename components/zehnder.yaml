number:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Ventilation level"
    address: 0x14A
    value_type: U_WORD
    min_value: 0
    max_value: 100
    step: 1
text_sensor:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Dump 0-99"
    id: dump_0_99
    address: 0x0
    register_type: holding
    register_count: 100
    response_size: 200
    skip_updates: 10
    lambda: |-
      std::string res = "Read " + to_string(data.size()/2) + " regs";
      int start_addr = 0x0;
      ESP_LOGI("DUMP", "--- Dump 0-99 Start ---");
      for (int i = 0; i < data.size() && i + 1 < data.size(); i += 2) {
        int addr = start_addr + (i / 2);
        uint16_t val = (uint16_t(data[i]) << 8) | uint16_t(data[i + 1]);
        if(val != 0) ESP_LOGI("DUMP", "Reg %d (0x%X): %u", addr, addr, val);
      }
      return res;

