  register_type: holding
  value_type: U_WORD
- platform: modbus_controller
  modbus_controller_id: modbus_device
  entity_category: "diagnostic"
  name: "Debug 0x142 (322)"
  address: 0x142
  register_type: holding
  value_type: U_WORD
- platform: modbus_controller
  modbus_controller_id: modbus_device
  entity_category: "diagnostic"
  name: "Debug 0x143 (323) - Potential Status?"
  address: 0x143
