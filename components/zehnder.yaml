text_sensor:
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Dump 0-31"
    id: dump_0_31
    address: 0x0
    register_type: holding
    register_count: 32
    response_size: 64
    update_interval: 20s
    lambda: |-
      std::string res = "";
      int start_addr = 0x0;
      ESP_LOGI("DUMP", "--- Dump 0-31 Start ---");
      for (int i = 0; i < data.size() && i + 1 < data.size(); i += 2) {
        int addr = start_addr + (i / 2);
        uint16_t val = (uint16_t(data[i]) << 8) | uint16_t(data[i + 1]);
        if(val != 0) {
          ESP_LOGI("DUMP", "Reg %d (0x%X): %u", addr, addr, val);
          res += to_string(addr) + ":" + to_string(val) + " ";
        }
      }
      return res;

