  value_type: U_WORD
- platform: modbus_controller
  modbus_controller_id: modbus_device
  entity_category: "diagnostic"
  name: "Debug 0x146 (326)"
  address: 0x146
  register_type: holding
  value_type: U_WORD
- platform: modbus_controller
