binary_sensor:
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Pre-heater active"
  address: 0x13F
  register_type: holding
  id: zehnder_pre_heater_active
  device_class: heat
- platform: modbus_controller
  modbus_controller_id: modbus_device
  name: "Pre-heater enabled"
  address: 0x152
  register_type: holding
  id: zehnder_pre_heater_enabled
