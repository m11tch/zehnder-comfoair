sensor:
  # --- Gap in Temperatures ---
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x12E (302) - Temp?"
    address: 0x12E
    register_type: holding
    value_type: S_WORD # Value was -500 (-50.0?)
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # --- Unknown Block 1 (After Temps, Before Fans) ---
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x132 (306)"
    address: 0x132
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x133 (307)"
    address: 0x133
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x134 (308)"
    address: 0x134
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x135 (309)"
    address: 0x135
    register_type: holding
    value_type: U_WORD

  # --- Unknown Block 2 (After Fans) ---
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x13C (316)"
    address: 0x13C
    register_type: holding
    value_type: U_WORD

  # 0x13D (317) is RF Input Voltage (Known)

  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x13E (318) - Potential Status?"
    address: 0x13E
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x13F (319)"
    address: 0x13F
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x140 (320)"
    address: 0x140
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x141 (321)"
    address: 0x141
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x142 (322)"
    address: 0x142
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x143 (323) - Potential Status?"
    address: 0x143
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x144 (324)"
    address: 0x144
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x145 (325)"
    address: 0x145
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x146 (326)"
    address: 0x146
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x147 (327)"
    address: 0x147
    register_type: holding
    value_type: U_WORD

  # 0x148, 0x149, 0x14A are Known Setpoints

  # --- Unknown Block 3 (High Registers) ---
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x14B (331)"
    address: 0x14B
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x150 (336) - Large Value"
    address: 0x150
    register_type: holding
