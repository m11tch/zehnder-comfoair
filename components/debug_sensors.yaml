  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x152 (338) - Potential Status?"
    address: 0x152
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x156 (342)"
    address: 0x156
    register_type: holding
    value_type: U_WORD
  - platform: modbus_controller
    modbus_controller_id: modbus_device
    name: "Debug 0x157 (343)"
    address: 0x157
    register_type: holding
